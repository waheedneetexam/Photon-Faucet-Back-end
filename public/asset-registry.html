<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotonBolt Asset Registry</title>
  <meta name="description" content="PhotonBolt RGB asset registry for regtest assets." />
  <link rel="stylesheet" href="/asset-registry.css?v=20260402a" />
</head>
<body>
  <div class="registry-shell">
    <header class="registry-header">
      <div>
        <p class="eyebrow">PhotonBolt Registry</p>
        <h1>Asset list</h1>
      </div>
      <div class="header-actions">
        <div class="search-wrap">
          <input id="registry-search" type="text" placeholder="Name/Contract ID" />
        </div>
        <div class="admin-panel">
          <div id="registry-admin-status" class="admin-status">Connect Photon Wallet to continue.</div>
          <div class="admin-buttons">
            <button id="registry-wallet-connect" class="toolbar-btn" type="button">Connect Wallet</button>
            <button id="registry-admin-login" class="toolbar-btn" type="button">Admin Login</button>
            <button id="registry-admin-logout" class="toolbar-btn secondary" type="button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main class="registry-card">
      <div id="registry-status" class="registry-status" aria-live="polite"></div>
      <div class="table-wrap">
        <table class="registry-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Token Name</th>
              <th>Total Supply</th>
              <th>Precision</th>
              <th>Address</th>
              <th>Creation Date</th>
              <th>Block Height</th>
              <th>Contract ID</th>
              <th>Transactions</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="registry-body">
            <tr class="loading-row">
              <td colspan="10">Loading registry...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <button id="prev-page-btn" class="page-btn" type="button">‹</button>
        <div id="pagination-info" class="pagination-info">Page 1</div>
        <button id="next-page-btn" class="page-btn" type="button">›</button>
      </div>
    </main>
  </div>

  <script src="/asset-registry.js?v=20260402a" defer></script>
</body>
</html>
