server {
    listen 80;
    server_name faucet.photonbolt.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name faucet.photonbolt.xyz;

    access_log /var/log/nginx/faucet.photonbolt.xyz.access.log;
    error_log /var/log/nginx/faucet.photonbolt.xyz.error.log;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /etc/letsencrypt/live/faucet.photonbolt.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faucet.photonbolt.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
